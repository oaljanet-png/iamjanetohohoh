  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#C15F3C;margin-bottom:22px;\">Retail consulting · Singapore<\u002Fdiv>\n        <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(40px,6.2vw,72px);line-height:1.0;letter-spacing:-0.03em;margin:0 0 24px;color:#2B2521;\">Stop the leaks.<br>Build the growth.<\u002Fh1>\n        <p style=\"font-size:clamp(17px,1.5vw,19px);line-height:1.6;color:#6B5E52;max-width:34em;margin:0 0 34px;\">The systems that ran your shop at five people quietly break at twenty — the SOPs, the buying, the customer data, the way you lead the floor. I find the gap you can't see, and I fix it. Small tweaks, big difference.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:14px;align-items:center;\">\n          <a href=\"#audit\" style=\"text-decoration:none;background:#C15F3C;color:#FBF3E9;font-weight:600;font-size:16px;padding:16px 28px;border-radius:999px;display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 24px -12px rgba(193,95,60,0.7);\" style-hover=\"background:#A34D2E;\">Take the 2-min gap audit <span style=\"font-family:'Space Mono',monospace;\">→<\u002Fspan><\u002Fa>\n          <a href=\"#solutions\" style=\"text-decoration:none;border:1.5px solid #2B2521;color:#2B2521;font-weight:600;font-size:16px;padding:15px 26px;border-radius:999px;\" style-hover=\"background:#2B2521;color:#FBF3E9;\">See how I help<\u002Fa>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showBrandLogos }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:46px;\">\n            <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:#A08B78;margin-bottom:14px;\">15+ years on the floor<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px 28px;align-items:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;color:#8A7862;letter-spacing:0.01em;\">\n              <span>H&amp;M<\u002Fspan><span>Louis Vuitton<\u002Fspan><span>Nespresso<\u002Fspan><span>Foot Locker<\u002Fspan><span>Castlery<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- GAP REPORT teaser card -->\n      <div style=\"position:relative;\">\n        <div style=\"background:#FFFCF6;border:1px solid #E7D8C4;border-radius:20px;padding:26px;box-shadow:0 30px 60px -30px rgba(51,41,31,0.45);transform:rotate(1.4deg);\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;border-bottom:1px dashed #E0CFB8;padding-bottom:14px;margin-bottom:18px;\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#8A7862;\">Gap Report<\u002Fspan>\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#8A7862;\">#0426<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:16px;\">\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;margin-bottom:6px;\"><span>Systems &amp; SOPs<\u002Fspan><span style=\"color:#5C8A5C;\">82%<\u002Fspan><\u002Fdiv>\n              <div style=\"height:7px;background:#EFE2CF;border-radius:999px;overflow:hidden;\"><div style=\"height:100%;width:82%;background:#C15F3C;border-radius:999px;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#FBECE4;margin:0 -8px;padding:12px 8px;border-radius:10px;\">\n              <div style=\"display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:6px;\"><span>Team &amp; Management <span style=\"font-family:'Space Mono',monospace;font-size:10px;color:#A34D2E;\">◀ GAP<\u002Fspan><\u002Fspan><span style=\"color:#A34D2E;\">41%<\u002Fspan><\u002Fdiv>\n              <div style=\"height:7px;background:#EFD3C4;border-radius:999px;overflow:hidden;\"><div style=\"height:100%;width:41%;background:#8A9A6B;border-radius:999px;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;font-size:13.5px;font-weight:600;margin-bottom:6px;\"><span>Customer &amp; Data<\u002Fspan><span style=\"color:#5C8A5C;\">67%<\u002Fspan><\u002Fdiv>\n              <div style=\"height:7px;background:#EFE2CF;border-radius:999px;overflow:hidden;\"><div style=\"height:100%;width:67%;background:#D79A45;border-radius:999px;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:20px;padding-top:16px;border-top:1px dashed #E0CFB8;font-size:13px;color:#6B5E52;line-height:1.5;\">\n            <strong style=\"color:#2B2521;\">1 hidden gap found.<\u002Fstrong> The way you manage hasn't scaled with the team — start here.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== PROBLEM ===== -->\n  <section id=\"problem\" style=\"scroll-margin-top:80px;background:#33291F;color:#F3E7D6;padding:clamp(64px,9vw,120px) 24px;\">\n    <div style=\"max-width:1160px;margin:0 auto;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#E0A56A;margin-bottom:22px;\">The pattern<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(30px,4.6vw,52px);line-height:1.05;letter-spacing:-0.02em;margin:0 0 28px;max-width:16em;\">The way you ran it at five people doesn't scale to twenty.<\u002Fh2>\n      <p style=\"font-size:clamp(16px,1.4vw,19px);line-height:1.65;color:#CDBBA3;max-width:40em;margin:0 0 56px;\">Growth doesn't announce itself. It just quietly stops working. The hands-on style that got you here starts creating the very bottlenecks that hold you back — and money leaks out through gaps you can't see from the inside. That's not a you problem. It's a systems problem, and systems are fixable.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;\">\n        <div style=\"border-top:2px solid #C15F3C;padding-top:20px;\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;margin-bottom:10px;\">Slipping through the cracks<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.6;color:#B7A487;margin:0;\">Counting stock takes a full week. Opening and closing depend on who's in. If it's not written down, it's not happening the same way twice.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:2px solid #8A9A6B;padding-top:20px;\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;margin-bottom:10px;\">Going in circles<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.6;color:#B7A487;margin:0;\">You're involved in every single decision. The way you led when it was just you and a friend isn't working anymore now that the team has grown.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:2px solid #D79A45;padding-top:20px;\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:20px;margin-bottom:10px;\">Who are you serving?<\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.6;color:#B7A487;margin:0;\">You're still guessing who your real customers are. The numbers that could tell you are either missing or sitting unused.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== AUDIT ===== -->\n  <section id=\"audit\" style=\"scroll-margin-top:80px;padding:clamp(64px,9vw,120px) 24px;\">\n    <div style=\"max-width:920px;margin:0 auto;text-align:center;margin-bottom:44px;\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#C15F3C;margin-bottom:20px;\">The 2-minute gap audit<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(30px,4.6vw,52px);line-height:1.05;letter-spacing:-0.02em;margin:0 0 20px;\">Find the leak you can't see.<\u002Fh2>\n      <p style=\"font-size:clamp(16px,1.4vw,18px);line-height:1.6;color:#6B5E52;max-width:34em;margin:0 auto;\">Eight quick questions across four areas of your business. At the end you'll see exactly where you're strong, where you're leaking, and the one gap to fix first.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- TOOL CARD -->\n    <div style=\"max-width:720px;margin:0 auto;background:#FFFCF6;border:1px solid #E7D8C4;border-radius:24px;box-shadow:0 34px 70px -40px rgba(51,41,31,0.5);overflow:hidden;\">\n\n      <!-- INTRO -->\n      <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"padding:clamp(28px,4vw,44px);\">\n          <div style=\"display:flex;gap:14px;justify-content:center;margin-bottom:30px;flex-wrap:wrap;\">\n            <div style=\"text-align:center;padding:0 12px;\"><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;color:#C15F3C;\">8<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:#8A7862;\">Questions<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:#E7D8C4;\"><\u002Fdiv>\n            <div style=\"text-align:center;padding:0 12px;\"><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;color:#C15F3C;\">~2<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:#8A7862;\">Minutes<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:1px;background:#E7D8C4;\"><\u002Fdiv>\n            <div style=\"text-align:center;padding:0 12px;\"><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;color:#C15F3C;\">4<\u002Fdiv><div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:#8A7862;\">Areas<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:22px;text-align:center;margin:0 0 8px;\">First — how big is your business right now?<\u002Fh3>\n          <p style=\"text-align:center;color:#8A7862;font-size:14px;margin:0 0 24px;\">It changes what \"good\" looks like for you.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px;\">\n            <sc-for list=\"{{ sizeChips }}\" as=\"chip\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ chip.onClick }}\" style=\"cursor:pointer;text-align:left;background:#FBF3E9;border:1.5px solid #E7D8C4;border-radius:14px;padding:18px 20px;font-family:'Hanken Grotesk',sans-serif;font-size:16px;font-weight:600;color:#2B2521;transition:all .15s;\" style-hover=\"border-color:#C15F3C;background:#FBECE4;\">{{ chip.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- QUIZ -->\n      <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:clamp(28px,4vw,44px);\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:{{ areaColor }};font-weight:700;\">{{ areaName }}<\u002Fspan>\n            <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#8A7862;\">{{ qNum }} / {{ qTotal }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-bottom:22px;\">{{ progressBarNode }}<\u002Fdiv>\n          <div style=\"font-size:14px;color:#8A7862;margin-bottom:10px;\">{{ areaSub }}<\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(19px,2.3vw,25px);line-height:1.3;margin:0 0 22px;\">{{ questionText }}<\u002Fh3>\n          <div style=\"display:flex;flex-direction:column;gap:10px;\">\n            <sc-for list=\"{{ options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ opt.onClick }}\" style=\"cursor:pointer;text-align:left;background:#FBF3E9;border:1.5px solid #E7D8C4;border-radius:12px;padding:15px 18px;font-family:'Hanken Grotesk',sans-serif;font-size:15.5px;font-weight:500;line-height:1.4;color:#2B2521;transition:all .15s;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;\" style-hover=\"border-color:#C15F3C;background:#FBECE4;\">{{ opt.label }}<span style=\"font-family:'Space Mono',monospace;color:#C6B49C;font-size:14px;flex-shrink:0;margin-top:1px;\">→<\u002Fspan><\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ back }}\" style=\"cursor:pointer;margin-top:22px;background:none;border:none;color:#8A7862;font-family:'Hanken Grotesk',sans-serif;font-size:14px;padding:4px 0;\" style-hover=\"color:#2B2521;\">← Back<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- RESULT -->\n      <sc-if value=\"{{ isResult }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"background:#33291F;color:#F3E7D6;padding:clamp(28px,4vw,40px);text-align:center;\">\n            <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#E0A56A;margin-bottom:14px;\">Your result<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(44px,8vw,64px);line-height:1;color:{{ bandColor }};\">{{ overallPct }}%<\u002Fdiv>\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:20px;margin-top:6px;\">{{ bandLabel }}<\u002Fdiv>\n            <p style=\"font-size:14.5px;line-height:1.55;color:#CDBBA3;max-width:30em;margin:12px auto 0;\">{{ bandLine }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"padding:clamp(28px,4vw,40px);\">\n            <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#8A7862;margin-bottom:16px;\">Your four areas<\u002Fdiv>\n            <div style=\"margin-bottom:32px;\">{{ areaBarsNode }}<\u002Fdiv>\n\n            <div style=\"background:#FBECE4;border:1px solid #F0D4C4;border-radius:16px;padding:24px;\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:#A34D2E;margin-bottom:8px;\">◀ Fix this first<\u002Fdiv>\n              <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:24px;margin:0 0 10px;\">Your biggest gap: {{ gapName }}<\u002Fh3>\n              <sc-if value=\"{{ hasSizeNote }}\" hint-placeholder-val=\"{{ false }}\">\n                <p style=\"font-size:15px;line-height:1.6;color:#6B5E52;margin:0 0 14px;font-style:italic;\">{{ sizeNote }}<\u002Fp>\n              <\u002Fsc-if>\n              <div style=\"border-top:1px dashed #E0CFB8;margin-top:16px;padding-top:16px;\">\n                <div style=\"font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:#8A7862;margin-bottom:6px;\">Recommended next step<\u002Fdiv>\n                <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:18px;margin-bottom:8px;\">{{ recTitle }}<\u002Fdiv>\n                <p style=\"font-size:15px;line-height:1.6;color:#6B5E52;margin:0 0 18px;\">{{ recDesc }}<\u002Fp>\n                <div style=\"display:flex;flex-wrap:wrap;gap:12px;\">\n                  <a href=\"#solutions\" style=\"text-decoration:none;background:#C15F3C;color:#FBF3E9;font-weight:600;font-size:15px;padding:13px 22px;border-radius:999px;\" style-hover=\"background:#A34D2E;\">Explore solutions →<\u002Fa>\n                  <button onclick=\"{{ restart }}\" style=\"cursor:pointer;background:none;border:1.5px solid #C6B49C;color:#6B5E52;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:15px;padding:12px 22px;border-radius:999px;\" style-hover=\"border-color:#2B2521;color:#2B2521;\">Retake audit<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SOLUTIONS ===== -->\n  <section id=\"solutions\" style=\"scroll-margin-top:80px;padding:clamp(64px,9vw,120px) 24px;\">\n    <div style=\"max-width:1160px;margin:0 auto;\">\n      <div style=\"max-width:640px;margin-bottom:48px;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#C15F3C;margin-bottom:20px;\">Where to start<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(30px,4.6vw,52px);line-height:1.05;letter-spacing:-0.02em;margin:0 0 18px;text-wrap:balance;\">Start anywhere.<br>Pick what fits.<\u002Fh2>\n        <p style=\"font-size:clamp(16px,1.4vw,18px);line-height:1.6;color:#6B5E52;margin:0;\">Every service stands on its own and works even better together. Not sure where to begin? The audit above points you to the right first move.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:20px;\">\n\n        <div style=\"background:#FFFCF6;border:1px solid #E7D8C4;border-radius:20px;padding:30px;display:flex;flex-direction:column;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#C15F3C;margin-bottom:14px;\">Digital tools &amp; templates<\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:23px;margin:0 0 10px;\">Ready-made systems<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#6B5E52;margin:0 0 20px;flex:1;\">Ready-made checklists, a faster way to count stock, and opening/closing lists your team will actually follow — so the shop runs the same whether you're there or not.<\u002Fp>\n          <a href=\"#contact\" style=\"text-decoration:none;color:#A34D2E;font-weight:600;font-size:15px;\" style-hover=\"color:#2B2521;\">Get the toolkit →<\u002Fa>\n        <\u002Fdiv>\n\n        <div style=\"background:#FFFCF6;border:1px solid #E7D8C4;border-radius:20px;padding:30px;display:flex;flex-direction:column;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#7B8A5A;margin-bottom:14px;\">Training &amp; courses<\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:23px;margin:0 0 10px;\">Train the team<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#6B5E52;margin:0 0 20px;flex:1;\">Training on methods to manage your team's performance and development, making sure everyone's working towards the same goals — plus training your team on how to display products in ways that actually drive sales.<\u002Fp>\n          <a href=\"#contact\" style=\"text-decoration:none;color:#A34D2E;font-weight:600;font-size:15px;\" style-hover=\"color:#2B2521;\">Book a session →<\u002Fa>\n        <\u002Fdiv>\n\n        <div style=\"background:#FFFCF6;border:1px solid #E7D8C4;border-radius:20px;padding:30px;display:flex;flex-direction:column;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#B7873C;margin-bottom:14px;\">1:1 Consultation<\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:23px;margin:0 0 10px;\">Fix it together<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#6B5E52;margin:0 0 20px;flex:1;\">We go through the gaps identified together. Figure out who your customers really are, review the methods and strategies that have stopped working, pull out the data that's been sitting forgotten, and work out an action plan you can start on.<\u002Fp>\n          <a href=\"#contact\" style=\"text-decoration:none;color:#A34D2E;font-weight:600;font-size:15px;\" style-hover=\"color:#2B2521;\">Work with me →<\u002Fa>\n        <\u002Fdiv>\n\n        <div style=\"background:#2B2521;color:#F3E7D6;border-radius:20px;padding:30px;display:flex;flex-direction:column;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#E0A56A;margin-bottom:14px;\">Store audit · start here<\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:23px;margin:0 0 10px;\">The easiest first step<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#CDBBA3;margin:0 0 20px;flex:1;\">We find out where you may be losing money, and the areas where there's an opportunity to make more. A short list of what to fix first.<\u002Fp>\n          <a href=\"#audit\" style=\"text-decoration:none;color:#F3D9B8;font-weight:600;font-size:15px;\" style-hover=\"color:#fff;\">Try the mini audit →<\u002Fa>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== ABOUT ===== -->\n  <section id=\"about\" style=\"scroll-margin-top:80px;background:#F2E6D5;padding:clamp(64px,9vw,120px) 24px;\">\n    <div style=\"max-width:1160px;margin:0 auto;display:grid;grid-template-columns:0.85fr 1.15fr;gap:clamp(32px,5vw,64px);align-items:start;\">\n      <div>\n        <div style=\"aspect-ratio:4/5;border-radius:20px;background:#33291F;border:1px solid #DcC7A8;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:space-between;padding:28px;\">\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#E0A56A;\">Retail · Singapore<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(90px,13vw,150px);line-height:0.82;color:#C15F3C;letter-spacing:-0.03em;\">Janet<br>Oh<\u002Fdiv>\n          <div style=\"font-family:'Space Mono',monospace;font-size:11px;color:#9C8461;letter-spacing:0.06em;\">15+ years on the floor<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;background:#FFFCF6;border:1px solid #DcC7A8;color:#6B5E52;padding:6px 12px;border-radius:999px;\">ACLP 2.0 Certified<\u002Fspan>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;background:#FFFCF6;border:1px solid #DcC7A8;color:#6B5E52;padding:6px 12px;border-radius:999px;\">Associate Trainer, SIRS<\u002Fspan>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;background:#FFFCF6;border:1px solid #DcC7A8;color:#6B5E52;padding:6px 12px;border-radius:999px;\">VM Consultant, EVMHP<\u002Fspan>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;background:#FFFCF6;border:1px solid #DcC7A8;color:#6B5E52;padding:6px 12px;border-radius:999px;\">WSQ Trainer<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#C15F3C;margin-bottom:20px;\">Trainer · Consultant · Facilitator<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(30px,4.4vw,48px);line-height:1.05;letter-spacing:-0.02em;margin:0 0 24px;\">15+ years on the floor — figuring out what's broken, then fixing it.<\u002Fh2>\n        <p style=\"font-size:16.5px;line-height:1.65;color:#5C5044;margin:0 0 18px;\">Across Louis Vuitton, H&amp;M, Nespresso, Foot Locker and Castlery, I've spent 15+ years finding what wasn't working in a store or a system, and fixing it alongside the teams around me.<\u002Fp>\n        <p style=\"font-size:16.5px;line-height:1.65;color:#5C5044;margin:0 0 18px;\">As Area VM overseeing multiple stores, our ION store hit #1 in the world ranking for a collection — a result of the merch, area, and store teams working together. I redesigned KPI systems so each layer of the team had clear, connected targets, which also created a structure for career development.<\u002Fp>\n        <p style=\"font-size:16.5px;line-height:1.65;color:#5C5044;margin:0 0 32px;\">I cut stock-take time down so staff spent less time on counts and more on the floor. I restructured part-timer scheduling into shorter blocks, keeping the same total hours but spreading them across more people — lowering cost while maintaining coverage. I redesigned and facilitated a Work in Showroom program that put senior leaders through the retail floor experience so they'd actually understand how the business runs. And I've built training that measurably improved conversion.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;\">\n          <div style=\"border-top:2px solid #C15F3C;padding-top:12px;\"><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(26px,3vw,34px);color:#2B2521;\">15+<\u002Fdiv><div style=\"font-size:12.5px;color:#8A7862;line-height:1.35;margin-top:2px;\">Years across luxury, fashion &amp; FMCG<\u002Fdiv><\u002Fdiv>\n          <div style=\"border-top:2px solid #8A9A6B;padding-top:12px;\"><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(26px,3vw,34px);color:#2B2521;\">#1<\u002Fdiv><div style=\"font-size:12.5px;color:#8A7862;line-height:1.35;margin-top:2px;\">World ranking, H&amp;M Coachella collection<\u002Fdiv><\u002Fdiv>\n          <div style=\"border-top:2px solid #D79A45;padding-top:12px;\"><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(26px,3vw,34px);color:#2B2521;\">5.5%<\u002Fdiv><div style=\"font-size:12.5px;color:#8A7862;line-height:1.35;margin-top:2px;\">Conversion lift through training<\u002Fdiv><\u002Fdiv>\n          <div style=\"border-top:2px solid #A9756B;padding-top:12px;\"><div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:clamp(26px,3vw,34px);color:#2B2521;\">6.28%<\u002Fdiv><div style=\"font-size:12.5px;color:#8A7862;line-height:1.35;margin-top:2px;\">Above a previous record sales high<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <blockquote style=\"margin:0;border-left:3px solid #C15F3C;padding-left:20px;font-family:'Bricolage Grotesque',sans-serif;font-weight:500;font-size:clamp(19px,2vw,24px);line-height:1.4;color:#2B2521;\">\"Small tweaks make big differences. And every business owner deserves support that feels safe to ask for.\"<\u002Fblockquote>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== TESTIMONIALS ===== -->\n  <sc-if value=\"{{ showTestimonials }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"padding:clamp(64px,9vw,120px) 24px;\">\n      <div style=\"max-width:1160px;margin:0 auto;\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#C15F3C;margin-bottom:36px;\">What others say<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:20px;\">\n          <div style=\"background:#FFFCF6;border:1px solid #E7D8C4;border-radius:20px;padding:32px;\">\n            <p style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:500;font-size:19px;line-height:1.5;color:#2B2521;margin:0 0 22px;\">\"Highly effective and engaging. It started with a clear focus on customer needs and expectations. The sessions were interactive, with well-designed activities, good Q&amp;A, and hands-on system demos.\"<\u002Fp>\n            <div style=\"font-weight:700;font-size:15px;\">Yao Zhang<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#8A7862;\">Vice President of Operations<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#FFFCF6;border:1px solid #E7D8C4;border-radius:20px;padding:32px;\">\n            <p style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:500;font-size:19px;line-height:1.5;color:#2B2521;margin:0 0 22px;\">\"An extremely engaging session with a positive learning environment for everyone. The activities were well organised and encouraged us to discuss and present as a group — interactive and practical.\"<\u002Fp>\n            <div style=\"font-weight:700;font-size:15px;\">Victoria Fong<\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#8A7862;\">Senior Demand Planner<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===== NEWSLETTER (beehiiv) ===== -->\n  <section id=\"newsletter\" style=\"scroll-margin-top:80px;background:#F2E6D5;padding:clamp(56px,7vw,92px) 24px;\">\n    <div style=\"max-width:1160px;margin:0 auto;background:#FFFCF6;border:1px solid #E7D8C4;border-radius:24px;padding:clamp(28px,4vw,52px);display:grid;grid-template-columns:1.1fr 0.9fr;gap:clamp(28px,5vw,56px);align-items:center;\">\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#C15F3C;margin-bottom:16px;\">The newsletter<\u002Fdiv>\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(26px,3.6vw,42px);line-height:1.05;letter-spacing:-0.02em;margin:0 0 14px;\">Retail tips, straight to your inbox.<\u002Fh2>\n        <p style=\"font-size:16.5px;line-height:1.6;color:#6B5E52;margin:0;max-width:32em;\">Short, practical notes on running a shop that scales — the small fixes, the systems, the things I wish every owner knew sooner. No fluff, unsubscribe anytime.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <!-- beehiiv: replace action with your publication's embed/subscribe URL -->\n        <form action=\"https://embeds.beehiiv.com/22660b96-5f21-41de-873d-fd6ebd91dae5\" method=\"POST\" target=\"_blank\" style=\"display:flex;flex-direction:column;gap:12px;\">\n          <input name=\"email\" type=\"email\" required=\"\" placeholder=\"you@email.com\" style=\"width:100%;box-sizing:border-box;background:#FBF3E9;border:1.5px solid #E7D8C4;border-radius:12px;padding:15px 16px;font-family:'Hanken Grotesk',sans-serif;font-size:16px;color:#2B2521;outline:none;\" style-focus=\"border-color:#C15F3C;\">\n          <button type=\"submit\" style=\"cursor:pointer;background:#2B2521;color:#FBF3E9;border:none;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:16px;padding:15px 22px;border-radius:12px;\" style-hover=\"background:#C15F3C;\">Get the tips →<\u002Fbutton>\n          <span style=\"font-family:'Space Mono',monospace;font-size:11px;color:#A08B78;letter-spacing:0.04em;\">Powered by beehiiv · no spam, ever<\u002Fspan>\n        <\u002Fform>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FINAL CTA ===== -->\n  <section id=\"contact\" style=\"scroll-margin-top:80px;background:#33291F;color:#F3E7D6;padding:clamp(64px,9vw,120px) 24px;\">\n    <div style=\"max-width:960px;margin:0 auto;\">\n      <div style=\"text-align:center;max-width:640px;margin:0 auto 56px;\">\n        <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(32px,5vw,56px);line-height:1.05;letter-spacing:-0.02em;margin:0 0 20px;\">Not sure where to begin?<\u002Fh2>\n        <p style=\"font-size:clamp(16px,1.5vw,19px);line-height:1.6;color:#CDBBA3;max-width:32em;margin:0 auto 36px;\">Start with the two-minute audit — it points you to the one gap worth fixing first. Then reach out below and we'll take it from there.<\u002Fp>\n        <a href=\"#audit\" style=\"text-decoration:none;background:#C15F3C;color:#FBF3E9;font-weight:600;font-size:17px;padding:17px 32px;border-radius:999px;display:inline-flex;align-items:center;gap:9px;\" style-hover=\"background:#D97a52;\">Take the gap audit <span style=\"font-family:'Space Mono',monospace;\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:0.9fr 1.1fr;gap:clamp(28px,5vw,56px);align-items:start;border-top:1px solid #4A3D2E;padding-top:56px;\">\n        <div>\n          <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#E0A56A;margin-bottom:18px;\">Get in touch<\u002Fdiv>\n          <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:clamp(24px,3vw,34px);line-height:1.1;letter-spacing:-0.02em;margin:0 0 16px;\">Have a question? Send it over.<\u002Fh3>\n          <p style=\"font-size:16px;line-height:1.6;color:#CDBBA3;margin:0 0 28px;\">Whether you're weighing up where to start or just want to talk through what's going on in your store — drop me a note and I'll get back to you personally.<\u002Fp>\n          <a href=\"https://www.linkedin.com/in/janet-oh/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:9px;border:1.5px solid #6B5B47;color:#F3E7D6;font-weight:600;font-size:14.5px;padding:11px 22px;border-radius:999px;\" style-hover=\"border-color:#E0A56A;color:#E0A56A;\">Connect on LinkedIn <span style=\"font-family:'Space Mono',monospace;\">→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n\n        <div style=\"background:#FFFCF6;border-radius:20px;padding:clamp(24px,3vw,36px);\">\n          <sc-if value=\"{{ contactSent }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center;padding:32px 8px;\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;color:#2B2521;margin-bottom:10px;\">Thank you — it's on its way.<\u002Fdiv>\n              <p style=\"font-size:15.5px;line-height:1.6;color:#6B5E52;margin:0;\">I'll be in touch soon. In the meantime, feel free to take the gap audit if you haven't yet.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ contactOpen }}\" hint-placeholder-val=\"{{ true }}\">\n            <form name=\"contact\" method=\"POST\" data-netlify=\"true\" netlify-honeypot=\"bot-field\" onsubmit=\"{{ submitContact }}\" style=\"display:flex;flex-direction:column;gap:16px;\">\n              <input type=\"hidden\" name=\"form-name\" value=\"contact\">\n              <p style=\"display:none;\"><label>Don't fill this out: <input name=\"bot-field\"><\u002Flabel><\u002Fp>\n              <div>\n                <label style=\"display:block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8A7862;margin-bottom:7px;\">Name<\u002Flabel>\n                <input name=\"name\" type=\"text\" required=\"\" value=\"{{ cName }}\" oninput=\"{{ onName }}\" placeholder=\"Your name\" style=\"width:100%;box-sizing:border-box;background:#FBF3E9;border:1.5px solid #E7D8C4;border-radius:12px;padding:13px 15px;font-family:'Hanken Grotesk',sans-serif;font-size:15.5px;color:#2B2521;outline:none;\" style-focus=\"border-color:#C15F3C;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8A7862;margin-bottom:7px;\">Email<\u002Flabel>\n                <input name=\"email\" type=\"email\" required=\"\" value=\"{{ cEmail }}\" oninput=\"{{ onEmail }}\" placeholder=\"you@email.com\" style=\"width:100%;box-sizing:border-box;background:#FBF3E9;border:1.5px solid #E7D8C4;border-radius:12px;padding:13px 15px;font-family:'Hanken Grotesk',sans-serif;font-size:15.5px;color:#2B2521;outline:none;\" style-focus=\"border-color:#C15F3C;\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#8A7862;margin-bottom:7px;\">Message<\u002Flabel>\n                <textarea name=\"message\" required=\"\" rows=\"4\" value=\"{{ cMsg }}\" oninput=\"{{ onMsg }}\" placeholder=\"What's on your mind?\" style=\"width:100%;box-sizing:border-box;background:#FBF3E9;border:1.5px solid #E7D8C4;border-radius:12px;padding:13px 15px;font-family:'Hanken Grotesk',sans-serif;font-size:15.5px;color:#2B2521;outline:none;resize:vertical;\" style-focus=\"border-color:#C15F3C;\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <button type=\"submit\" style=\"cursor:pointer;background:#C15F3C;color:#FBF3E9;border:none;font-family:'Hanken Grotesk',sans-serif;font-weight:600;font-size:16px;padding:15px 22px;border-radius:999px;\" style-hover=\"background:#A34D2E;\">{{ submitLabel }}<\u002Fbutton>\n            <\u002Fform>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"background:#2B2521;color:#8A7862;padding:32px 24px;\">\n    <div style=\"max-width:1160px;margin:0 auto;display:flex;flex-wrap:wrap;gap:16px;justify-content:space-between;align-items:center;font-size:13.5px;\">\n      <span style=\"font-family:'Space Mono',monospace;letter-spacing:0.06em;\">© 2026 Janet Oh · Singapore<\u002Fspan>\n      <a href=\"https://iamjanetohohoh.com/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;color:#8A7862;\" style-hover=\"color:#E0A56A;\">← Back to the universe<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showBrandLogos&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;showTestimonials&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;}}\">\nclass Component extends DCLogic {\n  state = { stage: 'intro', sizeIdx: null, qIndex: 0, answers: [], cName: '', cEmail: '', cMsg: '', contactSent: false, sending: false };\n\n  submitContact(e) {\n    e.preventDefault();\n    if (this.state.sending) return;\n    const data = { 'form-name': 'contact', name: this.state.cName, email: this.state.cEmail, message: this.state.cMsg };\n    const body = Object.keys(data).map(k => encodeURIComponent(k) + '=' + encodeURIComponent(data[k])).join('&');\n    this.setState({ sending: true });\n    fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body })\n      .then(() => this.setState({ contactSent: true, sending: false }))\n      .catch(() => this.setState({ contactSent: true, sending: false }));\n  }\n\n  sizes() { return ['Just me', '2–5 people', '6–20 people', '20+ people']; }\n\n  scale() {\n    return [\n      { label: 'Rarely / never', v: 0 },\n      { label: 'Sometimes', v: 1 },\n      { label: 'Mostly', v: 2 },\n      { label: 'Always, consistently', v: 3 },\n    ];\n  }\n\n  areaMeta() {\n    return {\n      systems:  { name: 'Systems & SOPs',        color: '#C15F3C', sub: 'Can the shop survive my absence?' },\n      team:     { name: 'Team & Management',      color: '#8A9A6B', sub: 'How do I handle people?' },\n      customer: { name: 'Customer & Data',        color: '#D79A45', sub: 'Do I actually know who buys from me?' },\n      space:    { name: 'Merchandising & Space',  color: '#A9756B', sub: 'Does the store look and feel right?' },\n    };\n  }\n\n  questions() {\n    return [\n      { area: 'systems', text: 'If you couldn\\u2019t come in tomorrow, what happens when the shop opens?', options: [\n        { label: 'Someone else opens it and nothing changes', v: 3 },\n        { label: 'It opens, but a few things get missed or done differently', v: 2 },\n        { label: 'It opens late, or someone calls to check with me', v: 1 },\n        { label: 'It doesn\\u2019t open \\u2014 there\\u2019s no one else who can run it', v: 0 },\n      ] },\n      { area: 'systems', text: 'Last time you needed to know exactly what stock you had, on the spot \\u2014 how did that go?', options: [\n        { label: 'Pulled up accurate numbers in minutes', v: 3 },\n        { label: 'Took an hour or two of checking around', v: 2 },\n        { label: 'Took most of a day, cross-checking things', v: 1 },\n        { label: 'Honestly, I\\u2019m not sure and haven\\u2019t really thought about it', v: 0 },\n      ] },\n      { area: 'team', text: 'A new hire\\u2019s first week \\u2014 how do they know what\\u2019s theirs to handle versus yours?', options: [\n        { label: 'Clear from a checklist or job description, they just know', v: 3 },\n        { label: 'Someone\\u2019s assigned to show them the ropes, and they learn by following that person', v: 2 },\n        { label: 'They ask me constantly', v: 1 },\n        { label: 'Everything routes through me regardless', v: 0 },\n      ] },\n      { area: 'team', text: 'Compare how you led the team a year or two ago to how you lead now \\u2014 what\\u2019s actually changed?', options: [\n        { label: 'I\\u2019ve had to build real systems for delegating and checking in', v: 3 },\n        { label: 'I still lead mostly the way I always have', v: 2 },\n        { label: 'I\\u2019ve kept up by putting in more hours myself, or bringing in extra part-time or family help', v: 1 },\n        { label: 'I\\u2019m doing more of everything myself, not less', v: 0 },\n      ] },\n      { area: 'customer', text: 'Describe your typical customer in one sentence \\u2014 could you do it right now, and does your team know that answer too?', options: [\n        { label: 'Yes, and any of my staff could tell you the same thing', v: 3 },\n        { label: 'I could describe them, but it\\u2019s not something the team has ever been told', v: 2 },\n        { label: 'I\\u2019d have to think about it for a bit', v: 1 },\n        { label: 'Honestly, whoever walks in', v: 0 },\n      ] },\n      { area: 'customer', text: 'Next time you order stock, what actually tells you what to buy?', options: [\n        { label: 'I look at sales data and trends, not just recent numbers', v: 3 },\n        { label: 'I check what the POS system shows me before ordering', v: 2 },\n        { label: 'What sold well recently, from memory', v: 1 },\n        { label: 'Gut feeling, or what\\u2019s worked before', v: 0 },\n      ] },\n      { area: 'space', text: 'Walk over to your best-selling shelf or rack right now \\u2014 why is it there?', options: [\n        { label: 'Deliberately placed there to drive that behavior', v: 3 },\n        { label: 'It\\u2019s been there a while, seemed to work', v: 2 },\n        { label: 'Not sure, it\\u2019s just where it ended up', v: 1 },\n        { label: 'Honestly, no idea', v: 0 },\n      ] },\n      { area: 'space', text: 'When did your window or main display last change, and why?', options: [\n        { label: 'On a set schedule, planned ahead', v: 3 },\n        { label: 'Whenever I get around to it', v: 2 },\n        { label: 'Can\\u2019t really remember', v: 1 },\n        { label: 'It\\u2019s been the same for a long while', v: 0 },\n      ] },\n    ];\n  }\n\n  recommendations() {\n    return {\n      systems:  { title: 'Digital Tools & Templates', desc: 'Ready-made checklists and a simple way to count stock — so the shop runs the same whether you\\u2019re there or not.' },\n      team:     { title: 'Training & Courses',        desc: 'Hands-on training on leading a team as it grows — clear roles, real delegation, and letting go of doing everything yourself.' },\n      customer: { title: '1:1 Consultation',          desc: 'We sit down together, figure out exactly who your customer is, and build simple habits for using that when you buy stock.' },\n      space:    { title: 'Visual Merchandising Training', desc: 'We walk through your store together and figure out what\\u2019s not working, then set up displays that actually pull people in — planned ahead, not just whenever there\\u2019s time.' },\n    };\n  }\n\n  start(i) { this.setState({ sizeIdx: i, stage: 'quiz', qIndex: 0, answers: [] }); }\n\n  choose(v) {\n    const answers = this.state.answers.slice();\n    answers[this.state.qIndex] = v;\n    const last = this.state.qIndex + 1 >= this.questions().length;\n    this.setState(last ? { answers, stage: 'result' } : { answers, qIndex: this.state.qIndex + 1 });\n  }\n\n  back() {\n    if (this.state.qIndex === 0) this.setState({ stage: 'intro' });\n    else this.setState({ qIndex: this.state.qIndex - 1 });\n  }\n\n  restart() { this.setState({ stage: 'intro', sizeIdx: null, qIndex: 0, answers: [] }); }\n\n  computeResult() {\n    const qs = this.questions();\n    const meta = this.areaMeta();\n    const order = ['systems', 'team', 'customer', 'space'];\n    const totals = { systems: 0, team: 0, customer: 0, space: 0 };\n    const counts = { systems: 0, team: 0, customer: 0, space: 0 };\n    qs.forEach((q, i) => { totals[q.area] += (this.state.answers[i] || 0); counts[q.area] += 1; });\n\n    const areas = order.map(k => {\n      const max = counts[k] * 3;\n      const pct = max ? Math.round((totals[k] / max) * 100) : 0;\n      return { key: k, name: meta[k].name, color: meta[k].color, pct };\n    });\n\n    let gap = areas[0];\n    areas.forEach(a => { if (a.pct < gap.pct) gap = a; });\n\n    const totalMax = qs.length * 3;\n    const totalScore = this.state.answers.reduce((s, v) => s + (v || 0), 0);\n    const overallPct = Math.round((totalScore / totalMax) * 100);\n\n    let bandLabel, bandColor, bandLine;\n    if (overallPct < 35) { bandLabel = 'Slipping through the cracks'; bandColor = '#E88A5E'; bandLine = 'Money is leaving the shop and you don\\u2019t even see it. The good news? You can fix these fast if you just focus on the holes.'; }\n    else if (overallPct < 60) { bandLabel = 'Going in circles'; bandColor = '#E0A56A'; bandLine = 'You\\u2019re working flat out, but you\\u2019re still just going in circles. Tidy up a few things, and you\\u2019ll stop feeling so drained.'; }\n    else if (overallPct < 80) { bandLabel = 'Falling into place'; bandColor = '#C9C06A'; bandLine = 'Everything is starting to come together. Fix the last few gaps and the shop will finally run properly even when you\\u2019re not around.'; }\n    else { bandLabel = 'Elevating the experience'; bandColor = '#A6C48A'; bandLine = 'You\\u2019ve got the shop running like clockwork. Now, you have the space to turn a simple transaction into an experience that makes your customers talk about you to everyone they know.'; }\n\n    return { areas, gap, overallPct, bandLabel, bandColor, bandLine };\n  }\n\n  sizeNoteFor(gapKey) {\n    const s = this.state.sizeIdx;\n    if (gapKey === 'team' && s >= 2) return 'The hands-on style that got you here doesn\\u2019t stretch to a team this size — that\\u2019s not a you problem, it\\u2019s a systems problem.';\n    if (gapKey === 'systems' && s === 0) return 'Systemising now is exactly what lets you grow later without burning out.';\n    if (gapKey === 'customer') return 'The businesses that scale cleanly are the ones that got specific about who they\\u2019re for before they got big.';\n    if (gapKey === 'space' && s >= 1) return 'Your space is your highest-traffic salesperson — small, planned changes here compound fast.';\n    return '';\n  }\n\n  bar(pct, color, track) {\n    return React.createElement('div', { style: { height: '7px', background: track || '#EFE2CF', borderRadius: '999px', overflow: 'hidden' } },\n      React.createElement('div', { style: { height: '100%', width: pct + '%', background: color, borderRadius: '999px', transition: 'width .4s ease' } })\n    );\n  }\n\n  renderVals() {\n    const showBrandLogos = this.props.showBrandLogos ?? true;\n    const showTestimonials = this.props.showTestimonials ?? true;\n    const stage = this.state.stage;\n    const meta = this.areaMeta();\n\n    const base = {\n      showBrandLogos, showTestimonials,\n      isIntro: stage === 'intro', isQuiz: stage === 'quiz', isResult: stage === 'result',\n      sizeChips: this.sizes().map((label, i) => ({ label, onClick: () => this.start(i) })),\n      back: () => this.back(),\n      restart: () => this.restart(),\n      contactSent: this.state.contactSent,\n      contactOpen: !this.state.contactSent,\n      cName: this.state.cName,\n      cEmail: this.state.cEmail,\n      cMsg: this.state.cMsg,\n      onName: (e) => this.setState({ cName: e.target.value }),\n      onEmail: (e) => this.setState({ cEmail: e.target.value }),\n      onMsg: (e) => this.setState({ cMsg: e.target.value }),\n      submitContact: (e) => this.submitContact(e),\n      submitLabel: this.state.sending ? 'Sending…' : 'Send message',\n    };\n\n    if (stage === 'quiz') {\n      const qs = this.questions();\n      const q = qs[this.state.qIndex];\n      const m = meta[q.area];\n      const pct = Math.round((this.state.qIndex / qs.length) * 100);\n      return Object.assign(base, {\n        questionText: q.text,\n        areaName: m.name,\n        areaSub: m.sub,\n        areaColor: m.color,\n        qNum: this.state.qIndex + 1,\n        qTotal: qs.length,\n        progressBarNode: this.bar(pct, '#C15F3C', '#EADBC6'),\n        options: q.options.map(o => ({ label: o.label, onClick: () => this.choose(o.v) })),\n      });\n    }\n\n    if (stage === 'result') {\n      const r = this.computeResult();\n      const rec = this.recommendations()[r.gap.key];\n      const note = this.sizeNoteFor(r.gap.key);\n      const areaBarsNode = React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: '16px' } },\n        r.areas.map(a => React.createElement('div', { key: a.key, style: a.key === r.gap.key ? { background: '#FBECE4', margin: '0 -8px', padding: '10px 8px', borderRadius: '10px' } : {} },\n          React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', fontSize: '14px', fontWeight: a.key === r.gap.key ? 700 : 600, marginBottom: '6px', color: '#2B2521' } },\n            React.createElement('span', null, a.name, a.key === r.gap.key ? React.createElement('span', { style: { fontFamily: \"'Space Mono',monospace\", fontSize: '10px', color: '#A34D2E', marginLeft: '8px' } }, '\\u25C0 GAP') : null),\n            React.createElement('span', { style: { color: a.color } }, a.pct + '%')\n          ),\n          this.bar(a.pct, a.color, '#EFE2CF')\n        ))\n      );\n      return Object.assign(base, {\n        overallPct: r.overallPct,\n        bandLabel: r.bandLabel,\n        bandColor: r.bandColor,\n        bandLine: r.bandLine,\n        gapName: r.gap.name,\n        areaBarsNode,\n        recTitle: rec.title,\n        recDesc: rec.desc,\n        hasSizeNote: !!note,\n        sizeNote: note,\n      });\n    }\n\n    return base;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
<style>
@media (max-width: 768px) {
  body { overflow-x: hidden; }

  /* Nav - hide text links, keep CTA only */
  [style*="display:flex;align-items:center;gap:26px"] > a:not(:last-child) {
    display: none !important;
  }
  [style*="display:flex;align-items:center;gap:26px"] {
    gap: 12px !important;
  }

  /* Nav container padding */
  [style*="max-width:1160px;margin:0 auto;padding:14px 24px;display:flex"] {
    padding: 12px 16px !important;
  }

  /* Hero - 2 col to 1 col */
  [style*="grid-template-columns:1.15fr"] {
    grid-template-columns: 1fr !important;
  }

  /* Hide hero card on mobile */
  [style*="transform:rotate(1.4deg)"] {
    display: none !important;
  }

  /* Problem section - 3 col to 1 col */
  [style*="grid-template-columns:repeat(3,1fr)"] {
    grid-template-columns: 1fr !important;
  }
